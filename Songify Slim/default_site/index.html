<html>
<head>
    <script>
        function getUrlParams(hash, start) {
            const idx = hash.indexOf(start);
            if (idx < 0) {
                return undefined;
            }
            const hashes = hash.slice(idx + start.length).split("&");

            if (!hashes || hashes.length === 0 || hashes[0] === "") {
                return undefined;
            }

            const params = {};
            hashes.map((hash) => {
                const [key, val] = hash.split("=");
                params[key] = decodeURIComponent(val);
            });
            return params;
        }

        function handleImplicitGrant() {
            const params = getUrlParams(window.location.hash, "#");
            if (!params) {
                return;
            }
            params.request_type = "token";

            fetch("?" + new URLSearchParams(params).toString(), {
                method: "POST",
            }).catch(function () { /* server may still process redirect */ });
        }
        handleImplicitGrant();

        function handleAuthenticationCode() {
            const params = getUrlParams(window.location.search, "?");
            if (!params) {
                return;
            }
            params.request_type = "code";

            fetch("?" + new URLSearchParams(params).toString(), {
                method: "POST",
            }).catch(function () { /* server may still process redirect */ });
        }
        handleAuthenticationCode();

        document.addEventListener("DOMContentLoaded", () => {
            const errorContainer = document.querySelector("#error");
            const successContainer = document.querySelector("#success");
            const params = new URLSearchParams(window.location.search);

            if (params.has("error")) {
                if (errorContainer) errorContainer.classList.remove("hidden");
            } else if (successContainer) {
                successContainer.classList.remove("hidden");
            }
        });
    </script>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');

    .hidden {
        display: none !important;
    }

    body {
        text-align: center;
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #1a1a1a;
        background-image: radial-gradient(#1f1f1f 1px, transparent 1px);
        background-size: 20px 20px;
        font-family: 'Inter', sans-serif;
    }

    h1 {
        color: #1ed760;
        font-weight: 700;
        font-size: 2.5rem;
        margin: 1.5rem 0 1rem;
        opacity: 0;
        transform: translateY(20px);
    }

        h1.animate {
            animation: fadeUp 0.6s ease-out forwards 0.5s;
        }

    p {
        color: #e2e8f0;
        font-size: 1.125rem;
        line-height: 1.6;
        margin: 0;
        opacity: 0;
        transform: translateY(20px);
    }

        p.animate {
            animation: fadeUp 0.6s ease-out forwards 0.7s;
        }

    .songify-text {
        font-family: 'Pacifico', cursive;
        color: #1ed760;
    }

    .content {
        height: 200px;
        width: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto;
        position: relative;
        opacity: 0;
        transform: scale(0.9);
    }

        .content.animate {
            animation: popIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .content img {
            height: 70;
            transition: transform 0.3s ease;
        }

            .content img:hover {
                transform: scale(1.1);
            }

    .plus-sign {
        margin: 0 1.5rem;
        color: #e2e8f0;
        font-size: 1.5rem;
        font-weight: bold;
    }

    .card {
        background: #2b2b2b;
        padding: 3rem;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        max-width: 90%;
        width: 440px;
        margin: 2rem;
        position: relative;
        overflow: hidden;
        border: 1px solid #363636;
    }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #1ed760, #1ed760);
        }

    @keyframes fadeUp {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes popIn {
        to {
            opacity: 1;
            transform: scale(1);
        }
    }
</style>

<body>
<div id="error" class="card hidden">
    <div class="content">
        <img src="https://songify.rocks/api/images/logo.png" alt="Songify Logo"/>
        <span class="plus-sign">+</span>
        <img src="https://storage.googleapis.com/pr-newsroom-wp/1/2023/05/Spotify_Primary_Logo_RGB_Green-300x300.png" alt="Spotify Logo"/>
    </div>
    <h1>Authorization issue</h1>
    <p>Spotify reported an error during login. You can close this page and try again in Songify.</p>
</div>

<div id="success" class="card hidden">
    <div class="content">
        <img src="https://songify.rocks/api/images/logo.png" alt="Songify Logo"/>
        <span class="plus-sign">+</span>
        <img src="https://storage.googleapis.com/pr-newsroom-wp/1/2023/05/Spotify_Primary_Logo_RGB_Green-300x300.png" alt="Spotify Logo"/>
    </div>
    <h1>Success!</h1>
    <p><span class="songify-text">Songify</span> and Spotify are now connected!<br/>You can close this page.</p>
</div>

<script>
        window.addEventListener('load', function () {
            const songifyLogo = document.querySelector('#success img[src*="songify.rocks"], #error img[src*="songify.rocks"]');
            if (!songifyLogo) return;

            function startAnimations() {
                const root = songifyLogo.closest('.card');
                if (!root) return;
                const content = root.querySelector('.content');
                const h1 = root.querySelector('h1');
                const p = root.querySelector('p');
                if (content) content.classList.add('animate');
                if (h1) h1.classList.add('animate');
                if (p) p.classList.add('animate');
            }

            if (songifyLogo.complete) {
                startAnimations();
            } else {
                songifyLogo.addEventListener('load', startAnimations);
            }
        });
    </script>
</body>
</html>
